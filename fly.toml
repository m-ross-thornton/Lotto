# Fly.io deployment config for MD Lotto Analyzer
# Deploy with: fly deploy
# First-time setup: fly launch --no-deploy, then fly deploy

app = "md-lotto-analyzer"
primary_region = "iad"       # IAD (Ashburn, VA) — closest to Maryland

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONPATH = "/app"

[http_service]
  internal_port    = 8501
  force_https      = true
  auto_stop_machines  = false   # stay alive for the background scraper loop
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/"

[[mounts]]
  source      = "lotto_data"    # fly volumes create lotto_data --region iad
  destination = "/app/data"
  initial_size = "1gb"

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 512
