# Fly.io deployment config for MD Lotto Analyzer
# First-time setup: fly launch --no-deploy --region iad
# Deploy: fly deploy

app = "md-lotto-analyzer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONPATH = "/app"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[mounts]]
  source = "lotto_data"
  destination = "/app/data"
  initial_size = "1gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
