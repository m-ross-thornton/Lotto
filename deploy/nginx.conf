# Nginx reverse proxy for MD Lotto Analyzer
# Place at: /etc/nginx/sites-available/mdlotto
# Then: sudo ln -s /etc/nginx/sites-available/mdlotto /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS + proxy to Streamlit
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Streamlit needs WebSocket support
    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;
    }
}
